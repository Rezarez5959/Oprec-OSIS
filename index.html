<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Seleksi OSIS</title>
    
    <!-- Script untuk Animasi Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        /* Desain Dasar */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('banner.png'); /* Ganti dengan path gambar Anda */
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(10px);
        }
        
        .container {
            background-color: white;
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        /* Tampilan Form Input */
        #search-section {
            padding: 40px 20px;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .logo img {
            height: 55px;
            width: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .error-text {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
        }

        /* =========================================
           DESAIN BAGIAN PENGUMUMAN HASIL
        ========================================= */
        #result-section {
            display: none; 
            width: 100%;
        }

        /* Bagian Atas (Gradien) */
        .result-top {
            padding: 30px 20px;
            transition: background 0.5s ease;
        }

        /* Logo Pill (Bentuk kapsul putih) */
        .logo-pill {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 8px 22px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .logo-pill img {
            height: 40px;
            width: auto;
        }

        /* Judul Selamat / Maaf */
        .result-title {
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
            width: 100%;
        }

        /* Bagian Bawah (Pesan) */
        .result-bottom {
            padding: 30px 25px;
            transition: background 0.5s ease;
        }
        .result-desc {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        /* TEMA JIKA LOLOS */
        .container.bg-lolos .result-top {
            background: linear-gradient(135deg, #1e3cff 0%, #5bc0ff 100%);
        }
        .container.bg-lolos .result-bottom {
            background: linear-gradient(to bottom, #f0f7ff, #ffffff);
            color: #007bff;
        }
        .container.bg-lolos .btn-kembali {
            background-color: #007bff;
        }
        .container.bg-lolos .btn-kembali:hover {
            background-color: #0970df;
        }

        /* TEMA JIKA TIDAK LOLOS */
        .container.bg-gagal .result-top {
            background: linear-gradient(135deg, #cc0000 40%, #ff9999 85%, #ffffff 100%);
        }
        .container.bg-gagal .result-bottom {
            background: linear-gradient(to bottom, #fff0f0, #ffffff);
            color: #7a1010;
        }
        .container.bg-gagal .btn-kembali {
            background-color: #cc0000;
        }
        .container.bg-gagal .btn-kembali:hover {
            background-color: #990000;
        }

        /* =========================================
           KHUSUS TAMPILAN MOBILE (HP)
        ========================================= */
        @media (max-width: 600px) {
            #search-section {
                padding: 30px 18px;
            }

            .logo {
                gap: 15px;
                margin-bottom: 20px;
            }
            .logo img {
                height: 45px;
            }

            h2 {
                font-size: 1.25rem;
            }
            h2 span {
                font-size: 1.7rem !important;
            }

            .result-top {
                padding: 25px 15px;
            }

            .logo-pill {
                padding: 6px 16px;
                gap: 12px;
            }
            .logo-pill img {
                height: 32px !important;
            }

            .result-title {
                font-size: 1.4rem;
            }
            #res-nama {
                font-size: 1.75rem !important;
            }

            .result-bottom {
                padding: 22px 18px 25px;
            }
            .result-desc {
                font-size: 15px;
                line-height: 1.5;
                margin-bottom: 20px;
            }
        }

        .logo img, .logo-pill img {
    flex-shrink: 0; /* Menjaga gambar tidak mengkerut/hilang di HP */
    object-fit: contain;
}
    </style>
</head>
<body>

    <div class="header finisher-header" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; z-index: -1;"></div>

    <div class="container" id="my-container">
        
        <!-- Bagian Input NIS -->
        <div id="search-section">
            <div class="logo">
                <img src="logoskanilan.png" alt="Logo Sekolah">
                <img src="logoosis.png" alt="Logo OSIS">
            </div>
            <div>
                <h2>Pengumuman Seleksi<br><span style="color: #007bff; font-weight: bold; font-size: 2.2rem;">OSIS ADHIGANA</span></h2>
                <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Masukkan Nomor Induk Siswa (NIS) Anda untuk melihat hasil seleksi.</p>
                
                <div class="form-group">
                    <input type="number" id="nis-input" placeholder="Contoh: 1001" required>
                </div>
            </div>
            <button id="btn-cek" onclick="cekKelulusan()">Cek Hasil</button>
            <div id="error-message" class="error-text"></div>
        </div>

        <!-- Bagian Hasil -->
        <div id="result-section">
            <!-- Separuh Atas (Gradien + Logo) -->
            <div class="result-top">
                <div class="logo-pill">
                    <img src="logoskanilan.png" alt="Logo Sekolah">
                    <img src="logoosis.png" alt="Logo OSIS">
                </div>
                <h2 class="result-title">
                    <span id="res-title-text">Selamat,</span><br>
                    <span id="res-nama" style="font-size: 2.3rem;">Nama Siswa</span>
                </h2>
            </div>
            
            <!-- Separuh Bawah (Teks Pesan) -->
            <div class="result-bottom">
                <p class="result-desc" id="res-message">
                    <!-- Teks diinjeksi via JS -->
                </p>
                <button class="btn-kembali" onclick="kembali()">Cek NIS Lain</button>
            </div>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydN4BZhy4qa4pKkj6NuQeLnPOOdfRlZY1ROFRGfFFDP4ypHKtq9S0D0N6DmPoNnMUT/exec";

        async function cekKelulusan() {
            const nis = document.getElementById("nis-input").value;
            const errorMsg = document.getElementById("error-message");
            const btn = document.getElementById("btn-cek");
            const containerBox = document.getElementById("my-container");

            if (!nis) {
                errorMsg.innerText = "NIS tidak boleh kosong!";
                return;
            }

            errorMsg.innerText = "";
            btn.innerText = "Mencari data...";
            btn.disabled = true;

            try {
                const response = await fetch(`${SCRIPT_URL}?nis=${nis}`);
                const data = await response.json();

                if (data.found) {
                    // Transisi Halaman
                    document.getElementById("search-section").style.display = "none";
                    document.getElementById("result-section").style.display = "block";
                    
                    // Set Nama
                    document.getElementById("res-nama").innerText = data.nama;
                    
                    // Elemen Teks
                    const titleText = document.getElementById("res-title-text");
                    const messageText = document.getElementById("res-message");

                    // LOGIKA PERUBAHAN WARNA DAN TEKS
                    if (data.status.toLowerCase().includes("tidak")) {
                        // JIKA TIDAK LOLOS
                        containerBox.classList.add("bg-gagal");
                        titleText.innerText = "Mohon Maaf,";
                        messageText.innerHTML = "Anda <strong>belum terpilih</strong> sebagai anggota OSIS ADHIGANA angkatan 2026/2027. Jangan patah semangat dan teruslah berkarya!";
                    } else {
                        // JIKA LOLOS
                        containerBox.classList.add("bg-lolos");
                        titleText.innerText = "Selamat,";
                        messageText.innerHTML = "Anda dipilih sebagai anggota <strong>OSIS ADHIGANA</strong> angkatan 2026/2027. Kami harap Anda dapat menjaga kepercayaan yang Kami berikan kepada Anda.";
                        
                        // Picu Animasi Confetti
                        confetti({
                            particleCount: 200, 
                            spread: 120,        
                            origin: { y: 0.6 }, 
                            zIndex: 9999,       
                            colors: ['#ffffff', '#15c83f', '#ffc107', '#007bff'] 
                        });
                    }
                } else {
                    errorMsg.innerText = "NIS tidak ditemukan dalam sistem.";
                }
            } catch (error) {
                errorMsg.innerText = "Terjadi kesalahan koneksi. Coba lagi.";
            } finally {
                btn.innerText = "Cek Hasil";
                btn.disabled = false;
            }
        }

        function kembali() {
            // Reset halaman
            document.getElementById("nis-input").value = "";
            document.getElementById("search-section").style.display = "block";
            document.getElementById("result-section").style.display = "none";
            
            // Hapus class tema agar kembali ke desain default
            const containerBox = document.getElementById("my-container");
            containerBox.classList.remove("bg-lolos", "bg-gagal");
        }
    </script>
</body>
</html>
